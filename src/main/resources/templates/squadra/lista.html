<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Teams')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="hero-stripe">
    <svg class="stripe-svg" viewBox="0 0 1440 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="0,200 400,0 1440,0 1440,200" fill="rgba(43,183,168,.06)"/>
        <polygon points="0,200 700,60 1440,120 1440,200" fill="rgba(43,183,168,.03)"/>
    </svg>
    <div class="hero-inner">
        <div class="page-header">
            <div class="page-header-left">
                <span class="eyebrow">👕 Squads &amp; Players</span>
                <h1 class="page-title">Teams</h1>
                <p class="page-subtitle">All registered teams</p>
            </div>
            <a th:href="@{/squadre/nuova}" sec:authorize="hasRole('ADMIN')" class="btn btn-primary">
                + New Team
            </a>
        </div>
    </div>
</div>

<div class="page-wrapper">
    <div th:if="${#lists.isEmpty(squadre)}" class="empty-state">
        <div class="empty-icon">👕</div>
        <p>No teams registered yet.</p>
    </div>

    <div class="card-grid">
        <div class="card" th:each="s : ${squadre}">
            <div class="card-accent-bar"></div>
            <div class="card-body">
                <div class="card-meta" th:text="${s.citta}"></div>
                <h3 class="card-title" th:text="${s.nome}"></h3>
                <p class="card-text">
                    Founded in <strong style="color:#fff" th:text="${s.annoFondazione}"></strong>
                </p>
            </div>
            <div class="card-footer">
                <a th:href="@{/squadre/{id}(id=${s.id})}" class="btn btn-primary btn-sm">Squad</a>
                <div sec:authorize="hasRole('ADMIN')" style="display:flex;gap:6px;margin-left:auto;flex-wrap:wrap">
                    <a th:href="@{/squadre/{id}/modifica(id=${s.id})}" class="btn btn-ghost btn-sm">Edit</a>
                    <form th:action="@{/squadre/{id}/elimina(id=${s.id})}" method="post" style="display:inline"
                          onsubmit="return confirm('Delete this team?')">
                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
