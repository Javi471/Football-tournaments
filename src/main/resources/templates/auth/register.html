<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Sign Up')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="page-wrapper" style="max-width:480px;margin-top:60px">
    <div class="form-card">
        <div style="text-align:center;margin-bottom:28px">
            <span class="eyebrow">Join the community</span>
            <h2 style="margin-top:8px">Create Account</h2>
        </div>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus minlength="3"
                       placeholder="Choose a username (min. 3 characters)"/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required minlength="6"
                       placeholder="At least 6 characters"/>
                <small>Password must be at least 6 characters long</small>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Create Account</button>
        </form>
        <p class="form-footer">Already have an account? <a th:href="@{/login}">Sign in</a></p>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
