<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Arbitri')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="page-header">
        <h1>Arbitri</h1>
        <a th:href="@{/arbitri/nuovo}" class="btn btn-primary">+ Nuovo Arbitro</a>
    </div>

    <div th:if="${#lists.isEmpty(arbitri)}" class="empty-state">
        <p>Nessun arbitro registrato.</p>
    </div>

    <table class="table" th:unless="${#lists.isEmpty(arbitri)}">
        <thead>
            <tr>
                <th>Cognome</th>
                <th>Nome</th>
                <th>Codice Arbitrale</th>
                <th>Azioni</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="a : ${arbitri}">
                <td th:text="${a.cognome}"></td>
                <td th:text="${a.nome}"></td>
                <td><span class="badge" th:text="${a.codiceArbitrale}"></span></td>
                <td>
                    <a th:href="@{/arbitri/{id}/modifica(id=${a.id})}" class="btn btn-sm">Modifica</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
