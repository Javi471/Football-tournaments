<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Tornei')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="page-header">
        <h1>Tornei di Calcio</h1>
        <a th:href="@{/tornei/nuovo}" sec:authorize="hasRole('ADMIN')" class="btn btn-primary">+ Nuovo Torneo</a>
    </div>

    <div th:if="${#lists.isEmpty(tornei)}" class="empty-state">
        <p>Nessun torneo disponibile.</p>
    </div>

    <div class="card-grid">
        <div class="card" th:each="torneo : ${tornei}">
            <div class="card-body">
                <h3 class="card-title" th:text="${torneo.nome}"></h3>
                <p class="card-subtitle" th:text="'Anno: ' + ${torneo.anno}"></p>
                <p th:text="${torneo.descrizione}" class="card-text"></p>
            </div>
            <div class="card-footer">
                <a th:href="@{/tornei/{id}(id=${torneo.id})}" class="btn btn-secondary">Dettagli</a>
                <a th:href="@{/tornei/{id}/classifica(id=${torneo.id})}" class="btn btn-outline">Classifica</a>
                <div sec:authorize="hasRole('ADMIN')" class="admin-actions">
                    <a th:href="@{/tornei/{id}/modifica(id=${torneo.id})}" class="btn btn-sm">Modifica</a>
                    <form th:action="@{/tornei/{id}/elimina(id=${torneo.id})}" method="post" style="display:inline"
                          onsubmit="return confirm('Eliminare questo torneo?')">
                        <button type="submit" class="btn btn-sm btn-danger">Elimina</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
